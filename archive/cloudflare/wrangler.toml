name = "front-door-page"
main = "worker/worker.js"
compatibility_date = "2026-05-01"

# One Worker serves both the page and the API — single deploy, single URL, no CORS.
[assets]
directory = "frontend"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "front_door"
database_id = "REPLACE_WITH_ID_FROM_d1_create"

# Custom domain — uncomment AFTER adding the sabia.casa zone to your
# Cloudflare account (Dashboard → Add a site, or transfer DNS to CF).
# routes = [
#   { pattern = "sabia.casa", custom_domain = true }
# ]

# Secrets (set via `wrangler secret put`):
#   TELEGRAM_BOT_TOKEN   — from @BotFather
#   TELEGRAM_CHAT_ID     — group/chat that receives notifications
#   HA_WEBHOOK_URL       — optional; Home Assistant webhook for automations
#   IP_SALT              — optional; salt for IP hashing (any random string)
