# Deploys the Front Door Page to Azure Static Web Apps on every push to main.
# This is the GitHub-native deploy Azure wires up when you create the SWA
# resource and point it at this repo — the same pattern as prior projects.
#
# Required repo secret: AZURE_STATIC_WEB_APPS_API_TOKEN
#   (Azure portal → your Static Web App → Manage deployment token)
# Frontend is prebuilt (frontend/app.js committed), so no build step is needed
# here; set skip_app_build true. If you'd rather build in CI, point app_build
# at frontend-src/build.sh instead.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "frontend"      # static assets (prebuilt)
          api_location: "api"           # Azure Functions v4 (managed)
          output_location: ""           # app_location already holds final assets
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
